<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & Sign Up - Learning Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="log-style.css">
</head>
<body>

  <!-- 🔳 Grid Background Boxes -->sans-serif
  <div class="background-boxes" id="backgroundGrid"></div>

  <!-- 🔐 Login/Signup Form -->
  <div class="container">
    <div class="tabs">
      <div class="tab active" id="loginTab">Login</div>
      <div class="tab" id="signupTab">Sign Up</div>
    </div>
    
    <form id="loginForm" class="active">
      <div class="form-group">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <span class="error-message" id="loginEmailError"></span>
      </div>
      <div class="form-group">
        <input type="password" id="loginPassword" placeholder="Password" required>
        <span class="error-message" id="loginPasswordError"></span>
      </div>
      <button type="submit" id="loginBtn">Login</button>
      <div class="form-message" id="loginMessage"></div>
    </form>
    
    <form id="signupForm">
      <div class="form-group">
        <input type="text" id="signupUsername" placeholder="Username" required>
        <span class="error-message" id="signupUsernameError"></span>
      </div>
      <div class="form-group">
        <input type="email" id="signupEmail" placeholder="Email" required>
        <span class="error-message" id="signupEmailError"></span>
      </div>
      <div class="form-group">
        <input type="password" id="signupPassword" placeholder="Password" required>
        <span class="error-message" id="signupPasswordError"></span>
      </div>
      <div class="form-group">
        <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>
        <span class="error-message" id="signupConfirmPasswordError"></span>
      </div>
      <div class="form-group">
        <input type="text" id="signupFirstName" placeholder="First Name (optional)">
      </div>
      <div class="form-group">
        <input type="text" id="signupLastName" placeholder="Last Name (optional)">
      </div>
      <button type="submit" id="signupBtn">Sign Up</button>
      <div class="form-message" id="signupMessage"></div>
    </form>
  </div>

  <script>
    // 🔄 Create grid boxes dynamically
    const gridContainer = document.getElementById('backgroundGrid');
    const cols = 20;
    const rows = 12;
    for (let i = 0; i < cols * rows; i++) {
      const box = document.createElement('div');
      gridContainer.appendChild(box);
    }

    // 🔁 Toggle tabs
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    loginTab.onclick = () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.classList.add('active');
      signupForm.classList.remove('active');
      clearMessages();
    };

    signupTab.onclick = () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.classList.add('active');
      loginForm.classList.remove('active');
      clearMessages();
    };

    // Clear error messages
    function clearMessages() {
      document.querySelectorAll('.error-message, .form-message').forEach(el => {
        el.textContent = '';
        el.className = el.className.replace(' success', '').replace(' error', '');
      });
    }

    // Show message
    function showMessage(elementId, message, type = 'error') {
      const element = document.getElementById(elementId);
      element.textContent = message;
      element.className = `form-message ${type}`;
    }

    // Show error
    function showError(elementId, message) {
      const element = document.getElementById(elementId);
      element.textContent = message;
      element.className = 'error-message';
    }

    // API base URL
    const API_BASE = window.location.origin + '/api';

    // Handle login form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const loginBtn = document.getElementById('loginBtn');
      
      // Clear previous errors
      clearMessages();
      
      // Basic validation
      if (!email || !password) {
        showMessage('loginMessage', 'Please fill in all fields', 'error');
        return;
      }

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';

        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          // Store token and user data
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          
          showMessage('loginMessage', 'Login successful! Redirecting...', 'success');
          
          // Redirect to home page
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          showMessage('loginMessage', data.message || 'Login failed', 'error');
        }
      } catch (error) {
        console.error('Login error:', error);
        showMessage('loginMessage', 'Network error. Please try again.', 'error');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });

    // Handle signup form submission
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('signupUsername').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('signupConfirmPassword').value;
      const firstName = document.getElementById('signupFirstName').value;
      const lastName = document.getElementById('signupLastName').value;
      const signupBtn = document.getElementById('signupBtn');
      
      // Clear previous errors
      clearMessages();
      
      // Basic validation
      if (!username || !email || !password || !confirmPassword) {
        showMessage('signupMessage', 'Please fill in all required fields', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showError('signupConfirmPasswordError', 'Passwords do not match');
        return;
      }

      if (password.length < 6) {
        showError('signupPasswordError', 'Password must be at least 6 characters long');
        return;
      }

      // Password strength validation
      const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/;
      if (!passwordRegex.test(password)) {
        showError('signupPasswordError', 'Password must contain at least one uppercase letter, one lowercase letter, and one number');
        return;
      }

      try {
        signupBtn.disabled = true;
        signupBtn.textContent = 'Creating Account...';

        const response = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            username,
            email,
            password,
            firstName,
            lastName
          })
        });

        const data = await response.json();

        if (data.success) {
          // Store token and user data
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          
          showMessage('signupMessage', 'Account created successfully! Redirecting...', 'success');
          
          // Redirect to home page
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          if (data.errors) {
            // Handle validation errors
            data.errors.forEach(error => {
              const field = error.path;
              const message = error.msg;
              showError(`${field}Error`, message);
            });
          } else {
            showMessage('signupMessage', data.message || 'Registration failed', 'error');
          }
        }
      } catch (error) {
        console.error('Signup error:', error);
        showMessage('signupMessage', 'Network error. Please try again.', 'error');
      } finally {
        signupBtn.disabled = false;
        signupBtn.textContent = 'Sign Up';
      }
    });

    // Check if user is already logged in
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      const user = localStorage.getItem('user');
      
      if (token && user) {
        // Redirect to home page if already logged in
        window.location.href = '/';
      }
    });
  </script>
</body>
</html>
