<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; margin: 10px 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 10px; padding: 15px; border-radius: 5px; white-space: pre-wrap; font-family: monospace; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .loading { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    </style>
</head>
<body>
    <h1>🤖 Gemini API Test & Setup</h1>
    
    <div class="test-section">
        <h3>Step 1: Test Current API Keys</h3>
        <button onclick="testCurrentKeys()">Test Current Keys</button>
        <div id="currentKeysResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>Step 2: Get New API Key</h3>
        <p>If the current keys don't work, you need to get a new API key:</p>
        <ol>
            <li>Go to <a href="https://makersuite.google.com/app/apikey" target="_blank">Google AI Studio</a></li>
            <li>Sign in with your Google account</li>
            <li>Click "Create API Key"</li>
            <li>Copy the generated key</li>
        </ol>
        <input type="text" id="newApiKey" placeholder="Paste your new API key here" style="width: 100%; padding: 10px; margin: 10px 0;">
        <button onclick="testNewKey()">Test New Key</button>
        <div id="newKeyResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>Step 3: Test Coding Question</h3>
        <button onclick="testCodingQuestion()">Test with Coding Question</button>
        <div id="codingResult" class="result"></div>
    </div>

    <script>
        const currentKeys = [
            'AIzaSyDMfOau3KqCvjlfi4DEMK06dhjoC0aqAcs',
            'AIzaSyD4blWuXpc51mwSrTlOMdC8aAlEsxaOPkY'
        ];
        const endpoints = [
            'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',
            'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent',
            'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent'
        ];
        
        async function testApiKey(apiKey, endpoint, prompt = "Hello! Please respond with 'API is working'") {
            try {
                const response = await fetch(`${endpoint}?key=${apiKey}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    return { success: false, error: `HTTP ${response.status}: ${errorText}` };
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    return { success: true, response: aiResponse, endpoint, apiKey: apiKey.substring(0, 10) + '...' };
                } else {
                    return { success: false, error: 'Unexpected response format', data };
                }
            } catch (error) {
                return { success: false, error: error.message };
            }
        }
        
        async function testCurrentKeys() {
            const resultDiv = document.getElementById('currentKeysResult');
            resultDiv.textContent = 'Testing current API keys...';
            resultDiv.className = 'result loading';
            
            let workingKey = null;
            let workingEndpoint = null;
            
            for (const key of currentKeys) {
                for (const endpoint of endpoints) {
                    const result = await testApiKey(key, endpoint);
                    if (result.success) {
                        workingKey = key;
                        workingEndpoint = endpoint;
                        resultDiv.textContent = `✅ SUCCESS!\n\nWorking API Key: ${result.apiKey}\nWorking Endpoint: ${result.endpoint}\nResponse: ${result.response}`;
                        resultDiv.className = 'result success';
                        return;
                    }
                }
            }
            
            resultDiv.textContent = '❌ None of the current API keys are working. You need to get a new API key from Google AI Studio.';
            resultDiv.className = 'result error';
        }
        
        async function testNewKey() {
            const newKey = document.getElementById('newApiKey').value.trim();
            if (!newKey) {
                alert('Please enter an API key first');
                return;
            }
            
            const resultDiv = document.getElementById('newKeyResult');
            resultDiv.textContent = 'Testing new API key...';
            resultDiv.className = 'result loading';
            
            for (const endpoint of endpoints) {
                const result = await testApiKey(newKey, endpoint);
                if (result.success) {
                    resultDiv.textContent = `✅ SUCCESS with new key!\n\nWorking Endpoint: ${result.endpoint}\nResponse: ${result.response}\n\nYou can now update your chatbot with this key!`;
                    resultDiv.className = 'result success';
                    return;
                }
            }
            
            resultDiv.textContent = '❌ The new API key is not working either. Please check if it\'s correct and try again.';
            resultDiv.className = 'result error';
        }
        
        async function testCodingQuestion() {
            const resultDiv = document.getElementById('codingResult');
            resultDiv.textContent = 'Testing coding question...';
            resultDiv.className = 'result loading';
            
            // Try with the first key and endpoint
            const result = await testApiKey(
                currentKeys[0], 
                endpoints[0], 
                "Write a simple Python function to calculate the factorial of a number. Include comments explaining each step."
            );
            
            if (result.success) {
                resultDiv.textContent = `✅ Coding question answered!\n\nResponse:\n${result.response}`;
                resultDiv.className = 'result success';
            } else {
                resultDiv.textContent = `❌ Failed to get coding response: ${result.error}`;
                resultDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
